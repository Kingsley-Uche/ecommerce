name: Laravel Build & Deploy to cPanel

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo_mysql, xml, bcmath, fileinfo

      # Install Composer dependencies
      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install Node dependencies
      - name: Install NPM dependencies
        run: npm ci

      # Build assets
      - name: Build frontend assets
        run: npm run build

      # Verify build
      - name: Verify build output
        run: ls -la public/build

      # Upload Vite build assets cleanly
      - name: Upload Vite build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "public/build/"
          strip_components: 1
          target: "${{ secrets.DEPLOY_PATH }}/ecommerce/public"

      # Deploy application and sync to web directory
      - name: Deploy Laravel
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}/ecommerce

            echo "Wiping untracked files but keeping live .env safe..."
            git clean -fd -e .env

            echo "Updating repository to match GitHub exactly..."
            git fetch origin main
            git reset --hard origin/main

            echo "Installing Composer packages..."
            composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

            echo "Syncing frontend assets to public web root..."
            cp -rT public/build /home/${{ secrets.SERVER_USER }}/public_html/build

            echo "Optimizing and caching Laravel with the live .env..."
            php artisan optimize:clear
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            chmod -R 775 storage bootstrap/cache